<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Diary App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-[#f4f7f4] to-[#e2eae2] min-h-screen p-6 font-sans">

    <div class="max-w-5xl mx-auto bg-white rounded-full shadow-sm p-4 flex justify-center space-x-3 mb-6">
        <a href="/" class="px-5 py-2 border border-gray-300 rounded-full font-semibold text-gray-700 hover:bg-gray-50 text-center">Home</a>
        <a href="/my-entries" class="px-5 py-2 border border-gray-300 rounded-full font-semibold text-gray-700 hover:bg-gray-50 text-center">My Entries</a>
        <a href="/mro-proof" class="px-5 py-2 border border-gray-300 rounded-full font-semibold text-gray-700 hover:bg-gray-50 text-center">MRO Proof</a>
        <a href="/login-page" class="px-5 py-2 border border-gray-300 rounded-full font-semibold text-gray-700 hover:bg-gray-50 text-center">Login</a>
        <a href="/signup-page" class="px-5 py-2 border border-gray-300 rounded-full font-semibold text-gray-700 hover:bg-gray-50 text-center">Signup</a>
    </div>
    <div class="max-w-5xl mx-auto bg-white border border-[#e8efe8] rounded-3xl p-8 shadow-sm flex flex-col md:flex-row justify-between gap-8">
        <div class="flex-1">
            <span class="text-xs font-bold uppercase tracking-wider text-[#4a7c59]">Capture Your Thoughts</span>
            <h1 class="text-3xl font-extrabold text-[#1c352d] mt-1 mb-4">Welcome to my Diary</h1>
        
            <div class="mt-6 bg-gray-50 p-6 rounded-2xl border border-gray-100 max-w-lg">
                <h2 class="text-lg font-bold text-gray-800 mb-4">✍️ New Diary Entry</h2>
                
                <form id="entryForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Title</label>
                        <input type="text" id="title" required placeholder="Today was an amazing day..." class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:border-[#4a7c59]">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Mood</label>
                        <select id="mood" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:border-[#4a7c59]">
                            <option value="Happy">😊 Happy</option>
                            <option value="Neutral">😐 Neutral</option>
                            <option value="Productive">🚀 Productive</option>
                            <option value="Tired">😴 Tired</option>
                            <option value="Sad">😢 Sad</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Content</label>
                        <textarea id="content" rows="4" required placeholder="Write your private thoughts here..." class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:border-[#4a7c59]"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-[#4a7c59] text-white py-2.5 rounded-xl font-bold hover:bg-[#3b6346] transition">Save to Diary</button>
                </form>
                <p id="formMessage" class="mt-3 text-sm font-semibold text-center"></p>
            </div>
        </div>
        <div class="w-full md:w-80 bg-[#f4f3ee] rounded-2xl p-6 border border-[#eae9e2] h-fit">
            <h3 class="font-bold text-[#1c352d] text-lg mb-3">Writing Prompts</h3>
            <ul class="list-disc list-inside space-y-2 text-gray-700 text-sm">
                <li>What made you smile today?</li>
                <li>Three things you are grateful for.</li>
                <li>One challenge you overcame.</li>
            </ul>
        </div>

    </div>

    <script>
        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = localStorage.getItem('token');
            const msgEl = document.getElementById('formMessage');

            if (!token) {
                msgEl.textContent = "❌ Error: You must be logged in to save entries!";
                msgEl.style.color = "red";
                return;
            }
            const res = await fetch('/api/entries', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    title: document.getElementById('title').value,
                    mood: document.getElementById('mood').value,
                    content: document.getElementById('content').value
                })
            });

            const data = await res.json();
if (res.status === 201) {
    msgEl.textContent = "🎉 Diary entry saved successfully! Redirecting...";
    msgEl.style.color = "green";
    document.getElementById('entryForm').reset();
    
    setTimeout(() => {
        window.location.href = '/my-entries';
    }, 1500);
} else {
                msgEl.textContent = "❌ " + (data.message || "Failed to save entry.");
                msgEl.style.color = "red";
            }
        });
    </script>

</body>
</html>
