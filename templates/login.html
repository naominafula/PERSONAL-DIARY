<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Log In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-[#f0f7ff] to-[#e0effe] min-h-screen flex items-center justify-center p-6 font-sans"></body>
    <div class="w-full max-w-md bg-[#f0f9ff] border border-[#bae6fd] rounded-3xl p-8 shadow-sm">
        <a href="/" class="text-sm text-[#4a7c59] font-bold hover:underline">← Back Home</a>
       <h1 class="text-3xl font-extrabold text-[#1d4ed8] mb-6">Welcome Back</h1> 
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:border-[#4a7c59]">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:border-[#4a7c59]">
            </div>
    <button type="submit" class="w-full bg-[#2563eb] text-white py-2.5 rounded-xl font-bold hover:bg-[#1d4ed8] transition shadow-sm">
    Log In
</button>
        </form>
        <p id="message" class="mt-4 text-sm text-center font-semibold"></p>
      <p class="text-sm text-center text-gray-600 mt-6">
    Don't have an account? <a href="/signup" class="text-[#2563eb] font-bold hover:underline">Sign up</a>
</p>  
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            const msgEl = document.getElementById('message');
            if (res.status === 200) {
                localStorage.setItem('token', data.access_token);
                msgEl.textContent = "Login successful! Redirecting...";
                msgEl.style.color = "green";
                setTimeout(() => window.location.href = '/', 1000);
            } else {
                msgEl.textContent = data.message || "Invalid credentials";
                msgEl.style.color = "red";
            }
        });
    </script>
</body>
</html>
