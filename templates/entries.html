<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>My Journal Entries</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-[#f4f7f4] to-[#e2eae2] min-h-screen p-6 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-3xl p-8 shadow-sm border border-[#e8efe8] mt-10 text-center">
        <a href="/" class="text-sm text-[#4a7c59] font-bold hover:underline">← Back Home</a>
        
        <div id="authRequired" class="my-8">
            <span class="text-4xl">🔒</span>
            <h1 class="text-3xl font-extrabold text-[#1d4ed8] mb-3">Authentication Required</h1>
            <p class="text-gray-500 max-w-sm mx-auto mt-2 text-sm">Please log in or create an account to view your secure diary entries.</p>
            <a href="/login-page" class="mt-4 inline-block bg-[#2563eb] text-white px-6 py-2 rounded-xl font-bold hover:bg-[#1d4ed8]">Go to Login</a>
        </div>
        <div id="entriesContainer" class="hidden my-8 text-left">
            <h1 class="text-3xl font-extrabold text-[#1c352d] mb-6">My Private Journal Entries</h1>
            <div id="entriesList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        async function deleteEntry(entryId) {
            if (!confirm("Are you sure you want to delete this journal entry?")) return;
            
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/entries/${entryId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 200) {
                fetchEntries();
            } else {
                alert("Failed to delete the entry.");
            }
        }

        async function fetchEntries() {
            const token = localStorage.getItem('token');
            if (!token) return;

            const res = await fetch('/api/entries', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 200) {
                const entries = await res.json();
                document.getElementById('authRequired').classList.add('hidden');
                document.getElementById('entriesContainer').classList.remove('hidden');
                
                const listEl = document.getElementById('entriesList');
                if (entries.length === 0) {
                    listEl.innerHTML = '<p class="text-gray-500 italic">No entries saved yet. Go back home to add some!</p>';
                } else {
                    listEl.innerHTML = entries.map(e => `
                       <!-- Bright blue content cards -->
    <div class="bg-white p-5 rounded-2xl border border-[#bae6fd] flex justify-between items-start shadow-sm">
        <div class="flex-1">
            <div class="flex items-center space-x-3 mb-2">
                <h3 class="font-bold text-lg text-gray-800">${e.title}</h3>
                <!-- Light blue pill tag for the mood -->
                <span class="bg-[#e0f2fe] text-[#1d4ed8] text-xs font-bold px-2.5 py-1 rounded-full">${e.mood}</span>
            </div>
            <p class="text-gray-600">${e.content}</p>
        </div>
        <!-- Sleek Red-tinted Delete Button to cleanly offset the blue dashboard --> 
                            <!-- 🗑️ Red Delete Button -->
                            <button onclick="deleteEntry(${e.id})" class="ml-4 text-red-500 hover:text-red-700 font-bold text-sm bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-xl transition">
                                Delete
                            </button>
                        </div>
                    `).join('');
                }
            }
        }
        fetchEntries();
    </script>
</body>
</html>
